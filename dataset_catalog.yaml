      - "우수사례 선정년도"
      - "주관기관"
      - "지역"
      - "_source"
      - "_endpoint_key"
      - "_collected_at"
      - "_guid"
    notes: "중소기업 기술개발 우수기업 현황. 과제번호(S/C 접두 코드) 포함."

