# ============================================================
# dataset_catalog.yaml — Single Point of Truth
# ============================================================
# 이 파일 하나가 모든 데이터셋의 기준이 됩니다.
#
# - validate.py  : 행 수 + 컬럼 존재 여부 검증 시 이 파일을 참조합니다.
# - generate_spec.py : DATA_SPEC.md 섹션 5 (컬럼 명세) 생성 시 이 파일을 참조합니다.
#
# 필드 설명:
#   name            : 데이터셋 표시명 (사양서 헤더에 사용)
#   file_prefix     : storage/output/ 내 CSV 파일명 앞부분 (날짜 제외)
#   source          : 수집 출처 기관
#   expected_count  : 마지막 API 확인 기준 예상 건수 (null이면 건수 체크 생략)
#   tolerance_pct   : 달성률 허용 하한 (기본 99). 이 값 미만이면 FAIL 판정.
#   columns         : 반드시 존재해야 할 컬럼 목록 (B안: 이 컬럼들이 모두 있으면 PASS)
#   notes           : 특이사항 (DATA_SPEC.md에도 출력됨)
# ============================================================

datasets:

